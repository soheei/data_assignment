<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>로그인</h1>
      <p class="subtitle">계정 정보를 입력해주세요</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">아이디</label>
          <input type="text" id="username" name="username" placeholder="아이디 입력" required>
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <!-- type="password" → 입력값이 *로 마스킹됨 (다 항목) -->
          <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
        </div>

        <div id="message" class="message"></div>

        <button type="submit" class="btn btn-primary">로그인</button>
      </form>

      <div class="divider"><span>또는</span></div>

      <!-- 회원가입 버튼 → 회원가입 페이지로 이동 (나 항목) -->
      <button type="button" class="btn btn-secondary" id="signupBtn">회원가입</button>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
