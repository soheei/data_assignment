<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>회원가입</h1>
      <p class="subtitle">정보를 입력해주세요</p>

      <form id="signupForm" novalidate>
        <!-- 아이디 -->
        <div class="form-group">
          <label for="username">아이디 <span class="required">*</span></label>
          <input type="text" id="username" name="username" placeholder="영문/숫자 4~20자" required>
          <small class="hint" id="hint-username">영문 또는 숫자, 4~20자</small>
        </div>

        <!-- 비밀번호 (마스킹) -->
        <div class="form-group">
          <label for="password">비밀번호 <span class="required">*</span></label>
          <!-- input type="password" 로 자동 마스킹 (다 항목, 5점) -->
          <input type="password" id="password" name="password" placeholder="영문+숫자+특수문자 8자 이상" required>
          <small class="hint" id="hint-password">영문, 숫자, 특수문자(!@#$%^&*) 포함 8자 이상</small>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label for="passwordConfirm">비밀번호 확인 <span class="required">*</span></label>
          <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호 재입력" required>
          <small class="hint" id="hint-passwordConfirm">위 비밀번호와 동일하게 입력하세요</small>
        </div>

        <!-- 이메일 -->
        <div class="form-group">
          <label for="email">이메일 <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="example@domain.com" required>
          <small class="hint" id="hint-email">올바른 이메일 형식으로 입력하세요</small>
        </div>

        <!-- 이름 -->
        <div class="form-group">
          <label for="name">이름 <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
          <small class="hint" id="hint-name">한글 또는 영문 2~20자</small>
        </div>

        <div id="message" class="message"></div>

        <button type="submit" class="btn btn-primary">가입하기</button>
        <button type="button" class="btn btn-secondary" id="backBtn">뒤로가기</button>
      </form>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>
